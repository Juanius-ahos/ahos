<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#ff751f" />
    <meta name="format-detection" content="telephone=no" />

    <script>
      (function() {
        var t = localStorage.getItem("theme");
        if (t === "light") document.documentElement.setAttribute("data-theme", "light");
      })();
    </script>

    <title>AHOS — Web Development, AI & Digital Design Agency | Custom Software Studio</title>
    <meta
      name="description"
      content="AHOS is a web development and digital design agency that builds premium websites, custom software, AI tools, Web3 platforms, and brand identities for businesses worldwide — from strategy to launch, under one roof."
    />
    <meta
      name="keywords"
      content="AHOS, web development agency, digital design, custom software, web design, AI development, SaaS, automation, blockchain, Web3, smart contracts, brand identity, Lebanon"
    />
    <meta name="author" content="AHOS — Advanced Hybrid Online Systems" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

    <!-- Geographic targeting (local SEO) -->
    <meta name="geo.region" content="LB" />
    <meta name="geo.placename" content="Lebanon" />

    <!-- Canonical (per-page values are refined at runtime by SEOHead) -->
    <link rel="canonical" href="https://www.ahos.xyz/" />

    <!-- Open Graph -->
    <meta property="og:title" content="AHOS — Web Development, AI & Digital Design Agency" />
    <meta
      property="og:description"
      content="AHOS is a web development and digital design agency. We take businesses from first idea to launched product — websites, custom software, AI tools, and Web3 platforms — designed, built, and shipped by one team."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.ahos.xyz/" />
    <meta property="og:site_name" content="AHOS — Digital Product Studio" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:image" content="https://www.ahos.xyz/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AHOS — Web Development, AI & Digital Design Agency" />
    <meta
      name="twitter:description"
      content="AHOS is a web development and digital design agency building premium websites, custom software, AI tools, and Web3 platforms — from strategy to launch."
    />
    <meta name="twitter:image" content="https://www.ahos.xyz/opengraph.jpg" />

    <!-- Icons & manifest (Vite rewrites root-relative paths to respect base) -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Fonts (non-blocking — preload swaps to stylesheet after paint) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap"
      />
    </noscript>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-8BRM1PM0V8"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-8BRM1PM0V8');
    </script>

    <!-- SPA route restore for GitHub Pages 404 fallback -->
    <script>
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search.slice(1).split("&").map(function (s) {
            return s.replace(/~and~/g, "&");
          }).join("?");
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
