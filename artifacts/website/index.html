<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#ff751f" />
    <meta name="format-detection" content="telephone=no" />

    <title>AHOS — Digital Product Studio</title>
    <meta
      name="description"
      content="AHOS is a digital product studio that builds premium websites, custom software, Web3 platforms, AI tools, and brand identities for businesses worldwide — from strategy to launch, under one roof."
    />
    <meta
      name="keywords"
      content="AHOS, digital studio, web development, custom software, SaaS, automation, blockchain, Web3, smart contracts, AI tools, brand identity, Lebanon"
    />
    <meta name="author" content="AHOS — Advanced Hybrid Online Systems" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

    <!-- Geographic targeting (local SEO) -->
    <meta name="geo.region" content="LB" />
    <meta name="geo.placename" content="Lebanon" />

    <!-- Canonical (per-page values are refined at runtime by SEOHead) -->
    <link rel="canonical" href="https://www.ahos.xyz/" />

    <!-- Open Graph -->
    <meta property="og:title" content="AHOS — Digital Product Studio" />
    <meta
      property="og:description"
      content="An independent product studio. We take businesses from first idea to launched product — designed, built, and shipped by one team."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.ahos.xyz/" />
    <meta property="og:site_name" content="AHOS — Digital Product Studio" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:image" content="https://www.ahos.xyz/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AHOS — Digital Product Studio" />
    <meta
      name="twitter:description"
      content="An independent product studio. We take businesses from first idea to launched product — designed, built, and shipped by one team."
    />
    <meta name="twitter:image" content="https://www.ahos.xyz/opengraph.jpg" />

    <!-- Icons & manifest (Vite rewrites root-relative paths to respect base) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Fonts (trimmed to weights actually used) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Lenis smooth scroll (drives the cinematic scroll feel) -->
    <script src="https://unpkg.com/lenis@1.1.18/dist/lenis.min.js"></script>

    <!-- SPA route restore for GitHub Pages 404 fallback -->
    <script>
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search.slice(1).split("&").map(function (s) {
            return s.replace(/~and~/g, "&");
          }).join("?");
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
