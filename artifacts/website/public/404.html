<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AHOS</title>
    <script>
      // SPA fallback for GitHub Pages: redirect a deep link back through the
      // app root, preserving the path so the client router can restore it.
      // Keeps the first path segment (the /AHOS-site/ project base).
      (function (l) {
        var pathSegmentsToKeep = 0;
        l.replace(
          l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
          l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") + "/?/" +
          l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
        );
      })(window.location);
    </script>
  </head>
  <body></body>
</html>
