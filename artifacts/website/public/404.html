<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AHOS — 404 · Page Not Found</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0b; color: #ede8e0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
      .c { text-align: center; max-width: 480px; }
      .l { width: 48px; height: 48px; margin-bottom: 20px; }
      h1 { font-size: clamp(56px, 12vw, 100px); font-weight: 700; letter-spacing: -0.04em; line-height: 1; margin-bottom: 8px; }
      p { color: rgba(237,232,224,0.66); font-size: 17px; line-height: 1.6; margin-bottom: 32px; }
      .links { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
      a { display: inline-flex; align-items: center; padding: 10px 22px; border-radius: 999px; font-size: 14px; font-weight: 600; text-decoration: none; transition: all 0.25s; }
      a.primary { background: #ff6a1a; color: #0a0a0b; }
      a.primary:hover { background: #ff8c4a; transform: translateY(-1px); }
      a.secondary { border: 1px solid rgba(255,255,255,0.12); color: rgba(237,232,224,0.7); }
      a.secondary:hover { border-color: rgba(255,255,255,0.25); color: #ede8e0; }
    </style>
    <!-- SPA fallback: redirect deep links through the app root -->
    <script>
      (function (l) {
        var pathSegmentsToKeep = 0;
        l.replace(
          l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
          l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") + "/?/" +
          l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
        );
      })(window.location);
    </script>
  </head>
  <body>
    <div class="c">
      <svg class="l" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="48" height="48" rx="10" fill="#ff6a1a"/>
        <text x="24" y="31" text-anchor="middle" fill="#0a0a0b" font-family="system-ui" font-size="20" font-weight="800">AH</text>
      </svg>
      <h1>404</h1>
      <p>This page doesn't exist — or it moved while you weren't looking.</p>
      <div class="links">
        <a class="primary" href="/">Home</a>
        <a class="secondary" href="/services">Services</a>
        <a class="secondary" href="/web3">Web3</a>
        <a class="secondary" href="/contact">Contact</a>
      </div>
    </div>
  </body>
</html>
