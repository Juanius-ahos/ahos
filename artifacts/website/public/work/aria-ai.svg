<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860">
  <rect width="1280" height="860" fill="#0a0a0b"/>
  <!-- Globe glow -->
  <circle cx="640" cy="200" r="340" fill="url(#g)" opacity="0.15"/>
  <defs>
    <radialGradient id="g"><stop offset="0" stop-color="#ff6a1a"/><stop offset="1" stop-color="#0a0a0b" stop-opacity="0"/></radialGradient>
    <linearGradient id="o" x1="0" y1="0" x2="1280" y2="0"><stop offset="0" stop-color="#ff6a1a"/><stop offset="1" stop-color="#ff9d4e"/></linearGradient>
  </defs>
  <!-- Header -->
  <text x="80" y="160" font-family="monospace" font-size="13" fill="rgba(255,255,255,0.34)">05</text>
  <line x1="100" y1="160" x2="130" y2="160" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <text x="145" y="160" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.34)" letter-spacing="2">AHOS AI</text>
  <text x="80" y="210" font-family="sans-serif" font-size="52" font-weight="600" fill="#ede8e0">Meet <tspan fill="url(#o)">ARIA.</tspan></text>
  <text x="80" y="250" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.48)">Your AI project advisor. Describe what you want to build and get instant, honest advice.</text>
  <!-- Chat card -->
  <rect x="80" y="290" width="600" height="440" rx="16" fill="#111113" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <!-- Chat header -->
  <rect x="80" y="290" width="600" height="48" rx="16" fill="#0e0e10"/>
  <rect x="80" y="322" width="600" height="1" fill="rgba(255,255,255,0.05)"/>
  <circle cx="104" cy="314" r="8" stroke="url(#o)" stroke-width="1.5" fill="none"/>
  <text x="120" y="318" font-family="sans-serif" font-size="14" font-weight="600" fill="#ede8e0">ARIA <tspan fill="rgba(255,255,255,0.34)" font-weight="400">by AHOS</tspan></text>
  <!-- Messages -->
  <rect x="96" y="354" width="320" height="52" rx="14" fill="#0a0a0b" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="108" y="380" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.66)">Hey there! I'm ARIA, your AI project</text>
  <text x="108" y="398" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.66)">advisor. What are you looking to build?</text>
  <!-- Chips -->
  <rect x="96" y="418" width="80" height="30" rx="15" fill="#0a0a0b" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <text x="113" y="438" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.48)">Website</text>
  <rect x="184" y="418" width="86" height="30" rx="15" fill="#0a0a0b" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <text x="199" y="438" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.48)">Mobile App</text>
  <rect x="278" y="418" width="86" height="30" rx="15" fill="#0a0a0b" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <text x="293" y="438" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.48)">SaaS Platform</text>
  <!-- Input bar -->
  <rect x="96" y="668" width="480" height="40" rx="10" fill="#0a0a0b" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <text x="108" y="693" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.24)">Message ARIA...</text>
  <rect x="588" y="668" width="40" height="40" rx="10" fill="#ff6a1a"/>
  <path d="M600 682l10 8-10 8" stroke="#0a0a0b" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="610,690 590,672 610,690 590,708" fill="#ff6a1a"/>
  <!-- Footer CTA -->
  <text x="80" y="790" font-family="sans-serif" font-size="14" fill="rgba(255,255,255,0.34)">Start building →</text>
  <rect x="500" y="770" width="140" height="36" rx="999" fill="#ff6a1a"/>
  <text x="520" y="794" font-family="sans-serif" font-size="12" font-weight="700" fill="#0a0a0b">Try ARIA ↗</text>
</svg>
